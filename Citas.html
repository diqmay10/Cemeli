<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEMELI | Citas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-100">

  <nav class="bg-[#051525] shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="Logo de cemeli.webp" alt="Logo" class="h-10 w-auto bg-white rounded-full p-1">
        <span class="text-white text-xl font-bold tracking-tight">CEMELI <span class="text-[#28A745]">Centro Médico</span></span>
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="index.html" class="text-gray-300 hover:text-[#28A745] font-medium transition-colors">Inicio</a>
        <a href="Servicios.html" class="text-gray-300 hover:text-[#28A745] font-medium transition-colors">Servicios</a>
        <a href="Nosotros.html" class="text-gray-300 hover:text-[#28A745] font-medium transition-colors">Nosotros</a>
        <a href="Citas.html" class="text-[#28A745] font-medium border-b-2 border-[#28A745] pb-1">Citas</a>
      </div>
    </div>
  </nav>

  <section class="py-16 px-6 flex justify-center items-center min-h-[calc(100vh-80px)]">
    <div class="max-w-5xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row">
      
      <div class="p-10 md:p-14 md:w-[65%]">
        <h2 class="text-3xl font-bold text-[#051525] mb-10">Solicitar una Cita</h2>
        
        <form class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" placeholder="Nombre completo" class="w-full p-4 bg-[#f8f9fc] border border-gray-100 rounded-xl text-gray-500 outline-none focus:ring-2 focus:ring-[#28A745]/20">
            <input type="email" placeholder="Correo electrónico" class="w-full p-4 bg-[#f8f9fc] border border-gray-100 rounded-xl text-gray-500 outline-none focus:ring-2 focus:ring-[#28A745]/20">
            <input type="tel" placeholder="Teléfono" class="w-full p-4 bg-[#f8f9fc] border border-gray-100 rounded-xl text-gray-500 outline-none focus:ring-2 focus:ring-[#28A745]/20">
            <select class="w-full p-4 bg-[#f8f9fc] border border-gray-100 rounded-xl text-gray-400 outline-none focus:ring-2 focus:ring-[#28A745]/20 appearance-none">
              <option>Seleccione Especialidad</option>
              <option>Cardiología</option>
              <option>Laboratorio Clínico</option>
              <option>Urgencias 24h</option>
            </select>
          </div>
          
          <button type="submit" class="w-full bg-[#051525] text-white font-bold py-4 rounded-xl hover:bg-[#0a1d37] transition-all uppercase tracking-wider text-sm mt-4">
            Enviar Solicitud
          </button>
        </form>
      </div>

      <div class="bg-[#28A745] p-10 md:p-14 md:w-[35%] text-white flex flex-col justify-center">
        <h3 class="text-2xl font-bold mb-10">Información</h3>
        
        <div class="space-y-8">
          <div class="flex items-start gap-4">
            <div class="mt-1">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </div>
            <p class="text-base leading-snug">C. ISIDORO ALBA #20, MUNICIPIO LICEY AL MEDIO
SANTIAGO.</p>
          </div>

          <div class="flex items-center gap-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            <p class="text-base">809-970-5840</p>
          </div>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
